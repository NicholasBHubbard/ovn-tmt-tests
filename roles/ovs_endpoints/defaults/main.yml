# Present endpoints need name, host, bridge and mac; addresses and routes default to empty.
# host is the Ansible inventory hostname where the namespace should exist.
# Routes need to; via, family, metric and table are optional.
# Listed endpoints default to present; absent removes them. Unlisted endpoints are untouched.
# ovs_endpoint_mtu defaults to 1500; mtu overrides it for one endpoint.
ovs_endpoints: []
ovs_endpoint_mtu: 1500
