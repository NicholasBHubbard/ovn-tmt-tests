ovn_install_method: "{{ install_method | default('distro') }}"
ovn_cc: ""

# source: build from local source directory
ovn_source_dir: /usr/src/ovn
ovn_configure_flags: ""
ovn_make_flags: ""
ovn_werror: false
ovn_dpdk: false
ovn_dpdk_dir: /usr/local/dpdk
ovn_dpdk_version: ""
ovn_dpdk_checksum: ""
ovn_dpdk_drivers: ""
ovn_dpdk_runtime_package_names:
  dnf:
    - libpcap
    - numactl-libs
  apt:
    - libpcap0.8
    - libnuma1
ovn_install_destdir: ""
ovn_build_dependency_package_names:
  dnf:
    - autoconf
    - automake
    - gcc
    - libtool
    - make
    - openssl-devel
  apt:
    - autoconf
    - automake
    - gcc
    - libtool
    - make
    - libssl-dev
  brew:
    - automake
    - libtool
ovn_build_repository_package_names:
  dnf: []
  apt: []

# git: clone from repo, then build
ovn_git_repo: https://github.com/ovn-org/ovn.git
ovn_git_branch: main
ovn_git_version: "{{ ovn_git_branch }}"
ovn_git_package_names:
  dnf:
    - git
  apt:
    - git
  brew:
    - git

# distro: install from distro repos (auto-detects dnf/apt)
ovn_distro_version: latest
ovn_distro_package_names:
  dnf:
    - openvswitch
    - ovn
    - ovn-central
    - ovn-host
  apt:
    - openvswitch-switch
    - ovn-common
    - ovn-central
    - ovn-host
ovn_distro_repository_package_names:
  dnf: []
  apt: []

# package: install from specific package files or a directory of packages
ovn_package_files: []
ovn_package_dir: ""

# artifact: install a source build fetched to the Ansible controller
ovn_artifact_name: ovn
ovn_artifact_build: true
# Reuse requires the exact resolved OVN revision and a matching manifest.
ovn_artifact_expected_revision: ""
ovn_artifact_cache_dir: ""
ovn_artifact_staging_dir: "/var/tmp/{{ ovn_artifact_name }}-root"
ovn_artifact_remote_path: "/var/tmp/{{ ovn_artifact_name }}.tar.gz"
ovn_artifact_manifest_remote_path: "/var/tmp/{{ ovn_artifact_name }}.json"
ovn_artifact_local_path: >-
  {{ ovn_artifact_cache_dir | default(inventory_dir, true) }}/{{ ovn_artifact_name }}.tar.gz
ovn_artifact_manifest_local_path: >-
  {{ ovn_artifact_cache_dir | default(inventory_dir, true) }}/{{ ovn_artifact_name }}.json
