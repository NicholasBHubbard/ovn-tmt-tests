ovn_install_method: distro
ovn_install_cc: ""

# source: build from local source directory
ovn_install_source_dir: /usr/src/ovn
ovn_install_configure_flags: ""
ovn_install_make_flags: ""
ovn_install_werror: false
ovn_install_dpdk_enabled: false
ovn_install_dpdk_dir: /usr/local/dpdk
ovn_install_dpdk_version: ""
ovn_install_dpdk_checksum: ""
ovn_install_dpdk_drivers: ""
ovn_install_dpdk_runtime_package_names:
  dnf:
    - libpcap
    - numactl-libs
  apt:
    - libpcap0.8
    - libnuma1
ovn_install_destdir: ""
ovn_install_build_dependency_package_names:
  dnf:
    - autoconf
    - automake
    - gcc
    - libtool
    - make
    - openssl-devel
  apt:
    - autoconf
    - automake
    - gcc
    - libtool
    - make
    - libssl-dev
  brew:
    - automake
    - libtool
ovn_install_build_repository_package_names:
  dnf: []
  apt: []

# git: clone from repo, then build
ovn_install_git_repo: https://github.com/ovn-org/ovn.git
ovn_install_git_branch: main
ovn_install_git_version: "{{ ovn_install_git_branch }}"
ovn_install_git_package_names:
  dnf:
    - git
  apt:
    - git
  brew:
    - git

# distro: install from distro repos (auto-detects dnf/apt)
ovn_install_distro_version: latest
ovn_install_distro_package_names:
  dnf:
    - openvswitch
    - ovn
    - ovn-central
    - ovn-host
  apt:
    - openvswitch-switch
    - ovn-common
    - ovn-central
    - ovn-host
ovn_install_distro_repository_package_names:
  dnf: []
  apt: []

# package: install from specific package files or a directory of packages
ovn_install_package_files: []
ovn_install_package_dir: ""
