- name: Verify install method is valid
  ansible.builtin.assert:
    that:
      - ovn_install_method in ["source", "git", "distro", "package"]
    fail_msg: "Unknown ovn_install_method '{{ ovn_install_method }}'. Valid: source, git, distro, package."

- name: Install OVN from source
  when:
    - ovn_install_method == "source"
    - not (ovn_installed | default(false))
  ansible.builtin.include_tasks: source.yml

- name: Install OVN from git
  when:
    - ovn_install_method == "git"
    - not (ovn_installed | default(false))
  ansible.builtin.include_tasks: git.yml

- name: Install OVN from distro repos
  when:
    - ovn_install_method == "distro"
    - not (ovn_installed | default(false))
  ansible.builtin.include_tasks: distro.yml

- name: Install OVN from package files
  when:
    - ovn_install_method == "package"
    - not (ovn_installed | default(false))
  ansible.builtin.include_tasks: package.yml

- name: Mark OVN as installed
  when: not (ovn_installed | default(false))
  ansible.builtin.set_fact:
    ovn_installed: true
