- name: Verify supported package manager
  ansible.builtin.assert:
    that:
      - ansible_facts["pkg_mgr"] in ["apt", "dnf", "dnf5", "yum", "homebrew"]
    fail_msg: "Only apt, dnf-compatible, and homebrew package managers are supported."

- name: Set package manager family
  ansible.builtin.set_fact:
    distro_package_manager_family: >-
      {{ 'apt' if ansible_facts['pkg_mgr'] == 'apt'
         else 'brew' if ansible_facts['pkg_mgr'] == 'homebrew'
         else 'dnf' }}

- name: Select repository packages for package manager
  ansible.builtin.set_fact:
    distro_selected_repository_package_names: >-
      {{
        distro_packages_repository_names[distro_package_manager_family] | default([])
        if distro_packages_repository_names is mapping
        else distro_packages_repository_names
      }}

- name: Select packages for package manager
  ansible.builtin.set_fact:
    distro_selected_package_names: >-
      {{
        distro_packages_names[distro_package_manager_family] | default([])
        if distro_packages_names is mapping
        else distro_packages_names
      }}

- name: Verify package list is configured
  ansible.builtin.assert:
    that:
      - distro_selected_package_names | length > 0
    fail_msg: "Set distro_packages_names for the detected package manager."

- name: Install repository packages (dnf)
  when:
    - ansible_facts["pkg_mgr"] in ["dnf", "dnf5", "yum"]
    - distro_selected_repository_package_names | length > 0
  ansible.builtin.dnf:
    name: "{{ distro_selected_repository_package_names }}"
    state: present

- name: Install repository packages (apt)
  when:
    - ansible_facts["pkg_mgr"] == "apt"
    - distro_selected_repository_package_names | length > 0
  ansible.builtin.apt:
    name: "{{ distro_selected_repository_package_names }}"
    state: present
    update_cache: "{{ distro_packages_update_cache }}"

- name: Install packages (dnf)
  when: ansible_facts["pkg_mgr"] in ["dnf", "dnf5", "yum"]
  ansible.builtin.dnf:
    name: "{{ distro_selected_package_names }}"
    state: "{{ distro_packages_state }}"

- name: Install packages (apt)
  when: ansible_facts["pkg_mgr"] == "apt"
  ansible.builtin.apt:
    name: "{{ distro_selected_package_names }}"
    state: "{{ distro_packages_state }}"
    update_cache: "{{ distro_packages_update_cache }}"

- name: Install packages (homebrew)
  when: ansible_facts["pkg_mgr"] == "homebrew"
  become: false
  community.general.homebrew:
    name: "{{ distro_selected_package_names }}"
    state: "{{ distro_packages_state }}"
