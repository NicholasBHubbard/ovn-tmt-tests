- name: Gather service facts
  when: ansible_facts["service_mgr"] == 'systemd'
  ansible.builtin.service_facts:

- name: Set openvswitch service availability
  ansible.builtin.set_fact:
    ovs_has_systemd_service: >-
      {{ ansible_facts["service_mgr"] == 'systemd'
         and 'openvswitch.service' in (ansible_facts.services | default({})) }}

- name: Start openvswitch via systemd
  when: ovs_has_systemd_service
  ansible.builtin.service:
    name: openvswitch
    state: started
    enabled: true

- name: Find ovs-ctl script
  when: not ovs_has_systemd_service
  ansible.builtin.find:
    paths:
      - /usr
      - /usr/local
    patterns: ovs-ctl
    file_type: file
    recurse: true
  register: ovs_ctl_find

- name: Select ovs-ctl script
  when: not ovs_has_systemd_service
  ansible.builtin.set_fact:
    ovs_ctl_path: "{{ (ovs_ctl_find.files | map(attribute='path') | list | first) | default('') }}"

- name: Verify ovs-ctl script exists
  when: not ovs_has_systemd_service
  ansible.builtin.assert:
    that:
      - ovs_ctl_path | length > 0
    fail_msg: "Could not find ovs-ctl under /usr or /usr/local."

- name: Start openvswitch via ovs-ctl
  when: not ovs_has_systemd_service
  ansible.builtin.command:
    cmd: "{{ ovs_ctl_path }} start"
  changed_when: true

- name: Create OVS bridges
  when: ovs_bridges | length > 0
  ansible.builtin.command:
    cmd: "ovs-vsctl --may-exist add-br {{ item }}"
  loop: "{{ ovs_bridges }}"
  changed_when: true

- name: Configure SSL private key
  when: ovs_ssl_enabled | bool
  ansible.builtin.command:
    cmd: "ovs-vsctl set-ssl {{ ovs_ssl_private_key }} {{ ovs_ssl_certificate }} {{ ovs_ssl_ca_cert }}"
  changed_when: true

- name: Clear SSL configuration
  when: not (ovs_ssl_enabled | bool)
  ansible.builtin.command:
    cmd: ovs-vsctl del-ssl
  changed_when: true

- name: Mark OVS as configured
  ansible.builtin.set_fact:
    ovs_configured: true
