- name: Install git
  ansible.builtin.include_role:
    name: distro_packages
  vars:
    distro_package_names: "{{ ovs_git_package_names }}"

- name: Clone OVS repository
  ansible.builtin.git:
    repo: "{{ ovs_git_repo }}"
    dest: "{{ ovs_source_dir }}"
    version: "{{ ovs_git_branch }}"

- name: Build and install from cloned source
  ansible.builtin.include_tasks: source.yml
