- name: Verify install method is valid
  ansible.builtin.assert:
    that:
      - ovs_setup_install_method in ["package", "distro", "source", "git"]
    fail_msg: "Unknown ovs_setup_install_method '{{ ovs_setup_install_method }}'. Valid: package, distro, source, git."

- name: Install OVS from distro packages
  when:
    - ovs_setup_install_method in ["package", "distro"]
    - not (ovs_installed | default(false))
  ansible.builtin.include_tasks: package.yml

- name: Install OVS from source
  when:
    - ovs_setup_install_method == "source"
    - not (ovs_installed | default(false))
  ansible.builtin.include_tasks: source.yml

- name: Install OVS from git
  when:
    - ovs_setup_install_method == "git"
    - not (ovs_installed | default(false))
  ansible.builtin.include_tasks: git.yml

- name: Mark OVS as installed
  when: not (ovs_installed | default(false))
  ansible.builtin.set_fact:
    ovs_installed: true

- name: Configure OVS
  when: not (ovs_configured | default(false))
  ansible.builtin.include_tasks: configure.yml
