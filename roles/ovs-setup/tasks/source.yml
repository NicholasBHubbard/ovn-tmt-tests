- name: Install build dependencies
  ansible.builtin.include_role:
    name: distro-packages
  vars:
    distro_package_names: "{{ ovs_build_dependency_package_names }}"
    distro_repository_package_names: "{{ ovs_build_repository_package_names }}"

- name: Bootstrap OVS
  ansible.builtin.command:
    cmd: ./boot.sh
    chdir: "{{ ovs_source_dir }}"
  changed_when: true

- name: Configure OVS
  ansible.builtin.command:
    cmd: "./configure {{ ovs_configure_flags }}"
    chdir: "{{ ovs_source_dir }}"
  changed_when: true

- name: Build OVS
  ansible.builtin.command:
    cmd: make -j{{ ansible_processor_vcpus }}
    chdir: "{{ ovs_source_dir }}"
  changed_when: true

- name: Install OVS
  ansible.builtin.command:
    cmd: make install
    chdir: "{{ ovs_source_dir }}"
  changed_when: true
