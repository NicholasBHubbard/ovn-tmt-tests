- name: Install build dependencies
  ansible.builtin.include_role:
    name: distro-packages
  vars:
    distro_package_names: "{{ ovn_build_dependency_package_names }}"
    distro_repository_package_names: "{{ ovn_build_repository_package_names }}"

- name: Check if OVS submodule exists
  ansible.builtin.stat:
    path: "{{ ovn_source_dir }}/ovs/configure.ac"
  register: ovs_submodule

# The git module cannot initialize submodules inside an arbitrary existing checkout.
- name: Initialize OVS submodule  # noqa command-instead-of-module
  when: not ovs_submodule.stat.exists
  ansible.builtin.command:
    cmd: git submodule update --init
    chdir: "{{ ovn_source_dir }}"
  changed_when: true

- name: Bootstrap OVS submodule
  ansible.builtin.command:
    cmd: ./boot.sh
    chdir: "{{ ovn_source_dir }}/ovs"
  changed_when: true

- name: Configure OVS submodule
  ansible.builtin.command:
    cmd: ./configure
    chdir: "{{ ovn_source_dir }}/ovs"
  changed_when: true

- name: Build OVS submodule
  ansible.builtin.command:
    cmd: make -j{{ ansible_processor_vcpus }}
    chdir: "{{ ovn_source_dir }}/ovs"
  changed_when: true

- name: Install OVS submodule
  ansible.builtin.command:
    cmd: make install
    chdir: "{{ ovn_source_dir }}/ovs"
  changed_when: true

- name: Bootstrap OVN
  ansible.builtin.command:
    cmd: ./boot.sh
    chdir: "{{ ovn_source_dir }}"
  changed_when: true

- name: Configure OVN
  ansible.builtin.command:
    cmd: "./configure {{ ovn_configure_flags }}"
    chdir: "{{ ovn_source_dir }}"
  changed_when: true

- name: Build OVN
  ansible.builtin.command:
    cmd: make -j{{ ansible_processor_vcpus }}
    chdir: "{{ ovn_source_dir }}"
  changed_when: true

- name: Install OVN
  ansible.builtin.command:
    cmd: make install
    chdir: "{{ ovn_source_dir }}"
  changed_when: true

- name: Mark OVS as installed (built as OVN submodule)
  ansible.builtin.set_fact:
    ovs_installed: true
