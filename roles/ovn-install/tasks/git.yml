- name: Install git
  ansible.builtin.include_role:
    name: distro-packages
  vars:
    distro_package_names: "{{ ovn_git_package_names }}"

- name: Clone OVN repository
  ansible.builtin.git:
    repo: "{{ ovn_git_repo }}"
    dest: "{{ ovn_source_dir }}"
    version: "{{ ovn_git_version }}"

- name: Build and install from cloned source
  include_tasks: source.yml
