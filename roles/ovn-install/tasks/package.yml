- name: Install OVN from package files (rpm)
  when: ansible_pkg_mgr in ["dnf", "dnf5", "yum"]
  ansible.builtin.dnf:
    name: "{{ ovn_package_files }}"
    state: present

- name: Install OVN from package files (deb)
  when: ansible_pkg_mgr == "apt"
  ansible.builtin.apt:
    deb: "{{ item }}"
  loop: "{{ ovn_package_files }}"
