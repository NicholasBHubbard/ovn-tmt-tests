- name: Verify OVN binaries are installed
  ansible.builtin.command:
    cmd: which ovn-controller
  changed_when: false

- name: Verify OVS is running
  ansible.builtin.command:
    cmd: ovs-vsctl show
  changed_when: false

- name: Gather service facts
  when: ansible_facts["service_mgr"] == 'systemd'
  ansible.builtin.service_facts:

- name: Set ovn-controller service availability
  ansible.builtin.set_fact:
    ovn_has_controller_service: >-
      {{ ansible_facts["service_mgr"] == 'systemd'
         and 'ovn-controller.service' in (ansible_facts.services | default({})) }}

# --- Configure OVS external-ids for OVN ---

- name: Configure ovn-remote
  ansible.builtin.command:
    cmd: "ovs-vsctl set open . external-ids:ovn-remote={{ ovn_remote }}"
  changed_when: true

- name: Configure ovn-encap-type
  ansible.builtin.command:
    cmd: "ovs-vsctl set open . external-ids:ovn-encap-type={{ ovn_encap_type }}"
  changed_when: true

- name: Configure ovn-encap-ip
  ansible.builtin.command:
    cmd: "ovs-vsctl set open . external-ids:ovn-encap-ip={{ ovn_encap_ip }}"
  changed_when: true

- name: Configure system-id
  ansible.builtin.command:
    cmd: "ovs-vsctl set open . external-ids:system-id={{ ovn_chassis_name }}"
  changed_when: true

- name: Configure OVN CMS options
  when: ovn_cms_options | length > 0
  ansible.builtin.command:
    argv:
      - ovs-vsctl
      - set
      - open
      - .
      - "external-ids:ovn-cms-options={{ ovn_cms_options | join(',') }}"
  changed_when: true

- name: Clear OVN CMS options
  when: ovn_cms_options | length == 0
  ansible.builtin.command:
    argv:
      - ovs-vsctl
      - remove
      - open
      - .
      - external_ids
      - ovn-cms-options
  changed_when: true

# --- Create OVN bridges ---

- name: Create OVN bridges
  ansible.builtin.command:
    cmd: "ovs-vsctl --may-exist add-br {{ item }}"
  loop: "{{ ovn_bridges }}"
  changed_when: true

- name: Configure bridge mappings
  when: ovn_bridge_mappings | length > 0
  ansible.builtin.command:
    cmd: "ovs-vsctl set open . external-ids:ovn-bridge-mappings={{ ovn_bridge_mappings }}"
  changed_when: true

- name: Clear bridge mappings
  when: ovn_bridge_mappings | length == 0
  ansible.builtin.command:
    argv:
      - ovs-vsctl
      - remove
      - open
      - .
      - external_ids
      - ovn-bridge-mappings
  changed_when: true

# --- Start ovn-controller ---

- name: Find ovn-ctl script
  when: not ovn_has_controller_service
  ansible.builtin.find:
    paths:
      - /usr
      - /usr/local
    patterns: ovn-ctl
    file_type: file
    recurse: true
  register: ovn_ctl_find

- name: Select ovn-ctl script
  when: not ovn_has_controller_service
  ansible.builtin.set_fact:
    ovn_ctl_path: "{{ (ovn_ctl_find.files | map(attribute='path') | list | first) | default('') }}"

- name: Verify ovn-ctl script exists
  when: not ovn_has_controller_service
  ansible.builtin.assert:
    that:
      - ovn_ctl_path | length > 0
    fail_msg: "Could not find ovn-ctl under /usr or /usr/local."

- name: Start ovn-controller via systemd
  when: ovn_has_controller_service
  ansible.builtin.service:
    name: ovn-controller
    state: started
    enabled: true

- name: Start ovn-controller via ovn-ctl
  when: not ovn_has_controller_service
  ansible.builtin.command:
    cmd: "{{ ovn_ctl_path }} start_controller"
  changed_when: true

# --- Wait for chassis registration ---

- name: Wait for ovn-controller to connect to SB database
  ansible.builtin.command:
    cmd: ovn-appctl -t ovn-controller connection-status
  retries: 10
  delay: 2
  register: controller_connected
  until: controller_connected.stdout == "connected"
  changed_when: false
