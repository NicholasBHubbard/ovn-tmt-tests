- name: Verify NAT rule states
  ansible.builtin.assert:
    that:
      - >-
        ovn_nat_rules
        | map(attribute='state', default='present')
        | difference(['present', 'absent'])
        | length == 0
    fail_msg: "NAT rule states must be present or absent."

- name: Verify NAT rule IDs are unique
  ansible.builtin.assert:
    that:
      - >-
        ovn_nat_rules | map(attribute='id') | unique | length
        == ovn_nat_rules | length
    fail_msg: "NAT rule IDs must be unique."

- name: Configure OVN NAT rules
  ansible.builtin.include_tasks: rule.yml
  loop: "{{ ovn_nat_rules }}"
  loop_control:
    loop_var: ovn_nat_rule
    label: "{{ ovn_nat_rule.id }}"
