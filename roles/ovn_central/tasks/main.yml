- name: Verify OVN binaries are installed
  ansible.builtin.command:
    cmd: which ovn-northd
  changed_when: false

- name: Verify OVS is running
  ansible.builtin.command:
    cmd: ovs-vsctl show
  changed_when: false

- name: Ensure OVN database directory exists
  ansible.builtin.file:
    path: "{{ ovn_db_dir }}"
    state: directory
    mode: "0755"

- name: Gather service facts
  when: ansible_facts["service_mgr"] == 'systemd'
  ansible.builtin.service_facts:

- name: Set ovn-northd service availability
  ansible.builtin.set_fact:
    ovn_has_northd_service: >-
      {{ ansible_facts["service_mgr"] == 'systemd'
         and 'ovn-northd.service' in (ansible_facts.services | default({})) }}

- name: Find ovn-ctl script
  when: not ovn_has_northd_service or (ovn_cluster_members | length > 0)
  ansible.builtin.find:
    paths:
      - /usr
      - /usr/local
    patterns: ovn-ctl
    file_type: file
    recurse: true
  register: ovn_ctl_find

- name: Select ovn-ctl script
  when: not ovn_has_northd_service or (ovn_cluster_members | length > 0)
  ansible.builtin.set_fact:
    ovn_ctl_path: "{{ (ovn_ctl_find.files | map(attribute='path') | list | first) | default('') }}"

- name: Verify ovn-ctl script exists
  when: not ovn_has_northd_service or (ovn_cluster_members | length > 0)
  ansible.builtin.assert:
    that:
      - ovn_ctl_path | length > 0
    fail_msg: "Could not find ovn-ctl under /usr or /usr/local."

# --- Standalone mode ---

- name: Start OVN central via systemd
  when:
    - ovn_has_northd_service
    - ovn_cluster_members | length == 0
  ansible.builtin.service:
    name: ovn-northd
    state: started
    enabled: true

- name: Start OVN central via ovn-ctl
  when:
    - not ovn_has_northd_service
    - ovn_cluster_members | length == 0
  ansible.builtin.command:
    cmd: >-
      {{ ovn_ctl_path }}
      --db-nb-create-insecure-remote=yes
      --db-sb-create-insecure-remote=yes
      --ovn-northd-log="-vfile:{{ ovn_log_level }}"
      start_northd
  changed_when: true

# --- Open Raft ports before cluster start ---

- name: Open OVN Raft ports in firewall
  when:
    - ovn_cluster_members | length > 0
    - "'firewalld.service' in (ansible_facts.services | default({}))"
    - "(ansible_facts.services['firewalld.service'].state | default('')) == 'running'"
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    state: enabled
    immediate: true
  loop:
    - "6643"
    - "6644"

# --- Clustered mode ---

- name: Start OVN NB cluster (leader)
  when:
    - ovn_cluster_members | length > 0
    - ansible_host == ovn_cluster_members[0]
  ansible.builtin.command:
    cmd: >-
      {{ ovn_ctl_path }}
      --db-nb-cluster-local-addr={{ ansible_host }}
      start_nb_ovsdb
  changed_when: true

- name: Start OVN SB cluster (leader)
  when:
    - ovn_cluster_members | length > 0
    - ansible_host == ovn_cluster_members[0]
  ansible.builtin.command:
    cmd: >-
      {{ ovn_ctl_path }}
      --db-sb-cluster-local-addr={{ ansible_host }}
      start_sb_ovsdb
  changed_when: true

- name: Start OVN NB cluster (follower)
  when:
    - ovn_cluster_members | length > 0
    - ansible_host != ovn_cluster_members[0]
  ansible.builtin.command:
    cmd: >-
      {{ ovn_ctl_path }}
      --db-nb-cluster-local-addr={{ ansible_host }}
      --db-nb-cluster-remote-addr={{ ovn_cluster_members[0] }}
      start_nb_ovsdb
  changed_when: true

- name: Start OVN SB cluster (follower)
  when:
    - ovn_cluster_members | length > 0
    - ansible_host != ovn_cluster_members[0]
  ansible.builtin.command:
    cmd: >-
      {{ ovn_ctl_path }}
      --db-sb-cluster-local-addr={{ ansible_host }}
      --db-sb-cluster-remote-addr={{ ovn_cluster_members[0] }}
      start_sb_ovsdb
  changed_when: true

- name: Start ovn-northd (clustered)
  when: ovn_cluster_members | length > 0
  ansible.builtin.command:
    cmd: >-
      ovn-northd
      --pidfile --detach --log-file
      -vconsole:off -vfile:{{ ovn_log_level }}
  changed_when: true

# --- Wait for databases ---

- name: Wait for NB database to be ready
  ansible.builtin.command:
    cmd: >-
      ovn-nbctl
      {% if ovn_cluster_members | length > 0 %}--no-leader-only{% endif %}
      show
  retries: 10
  delay: 2
  register: nb_ready
  until: nb_ready.rc == 0
  changed_when: false

- name: Wait for SB database to be ready
  ansible.builtin.command:
    cmd: >-
      ovn-sbctl
      {% if ovn_cluster_members | length > 0 %}--no-leader-only{% endif %}
      show
  retries: 10
  delay: 2
  register: sb_ready
  until: sb_ready.rc == 0
  changed_when: false

# --- Open firewall ports ---

- name: Gather service facts
  ansible.builtin.service_facts:

- name: Open OVN database ports in firewall
  when:
    - "'firewalld.service' in ansible_facts.services"
    - "ansible_facts.services['firewalld.service'].state == 'running'"
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    state: enabled
    immediate: true
  loop:
    - "{{ ovn_nb_port }}"
    - "{{ ovn_sb_port }}"

# --- Configure listeners ---

- name: Set ovn-nbctl/sbctl cluster args
  when: ovn_cluster_members | length > 0
  ansible.builtin.set_fact:
    ovn_ctl_cluster_args: "--no-leader-only"

- name: Configure NB TCP listener
  when: not (ovn_ssl_enabled | bool)
  ansible.builtin.command:
    cmd: "ovn-nbctl {{ ovn_ctl_cluster_args | default('') }} set-connection ptcp:{{ ovn_nb_port }}:0.0.0.0"
  changed_when: true

- name: Configure SB TCP listener
  when: not (ovn_ssl_enabled | bool)
  ansible.builtin.command:
    cmd: "ovn-sbctl {{ ovn_ctl_cluster_args | default('') }} set-connection ptcp:{{ ovn_sb_port }}:0.0.0.0"
  changed_when: true

- name: Clear NB SSL configuration
  when: not (ovn_ssl_enabled | bool)
  ansible.builtin.command:
    cmd: "ovn-nbctl {{ ovn_ctl_cluster_args | default('') }} del-ssl"
  changed_when: true

- name: Clear SB SSL configuration
  when: not (ovn_ssl_enabled | bool)
  ansible.builtin.command:
    cmd: "ovn-sbctl {{ ovn_ctl_cluster_args | default('') }} del-ssl"
  changed_when: true

# --- TLS configuration ---

- name: Configure NB SSL certificates
  when: ovn_ssl_enabled | bool
  ansible.builtin.command:
    cmd: >-
      ovn-nbctl {{ ovn_ctl_cluster_args | default('') }}
      set-ssl {{ ovn_ssl_private_key }} {{ ovn_ssl_certificate }} {{ ovn_ssl_ca_cert }}
  changed_when: true

- name: Configure SB SSL certificates
  when: ovn_ssl_enabled | bool
  ansible.builtin.command:
    cmd: >-
      ovn-sbctl {{ ovn_ctl_cluster_args | default('') }}
      set-ssl {{ ovn_ssl_private_key }} {{ ovn_ssl_certificate }} {{ ovn_ssl_ca_cert }}
  changed_when: true

- name: Configure NB SSL listener
  when: ovn_ssl_enabled | bool
  ansible.builtin.command:
    cmd: "ovn-nbctl {{ ovn_ctl_cluster_args | default('') }} set-connection pssl:{{ ovn_nb_port }}:0.0.0.0"
  changed_when: true

- name: Configure SB SSL listener
  when: ovn_ssl_enabled | bool
  ansible.builtin.command:
    cmd: "ovn-sbctl {{ ovn_ctl_cluster_args | default('') }} set-connection pssl:{{ ovn_sb_port }}:0.0.0.0"
  changed_when: true
