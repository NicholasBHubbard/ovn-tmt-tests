- name: Verify ACL states
  ansible.builtin.assert:
    that:
      - >-
        ovn_acls
        | map(attribute='state', default='present')
        | difference(['present', 'absent'])
        | length == 0
    fail_msg: "ACL states must be present or absent."

- name: Verify ACL IDs are unique
  ansible.builtin.assert:
    that:
      - ovn_acls | map(attribute='id') | unique | length == ovn_acls | length
    fail_msg: "ACL IDs must be unique."

- name: Configure OVN ACLs
  ansible.builtin.include_tasks: acl.yml
  loop: "{{ ovn_acls }}"
  loop_control:
    loop_var: ovn_acl
    label: "{{ ovn_acl.id }}"
