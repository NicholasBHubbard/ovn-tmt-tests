- name: Verify endpoint states
  ansible.builtin.assert:
    that:
      - >-
        ovn_endpoints
        | map(attribute='state', default='present')
        | difference(['present', 'absent'])
        | length == 0
    fail_msg: "Endpoint states must be present or absent."

- name: Verify endpoint address modes
  ansible.builtin.assert:
    that:
      - >-
        ovn_endpoints
        | map(attribute='address_mode', default='static')
        | difference(['static', 'dynamic'])
        | length == 0
    fail_msg: "Endpoint address modes must be static or dynamic."

- name: Verify default endpoint MTU
  ansible.builtin.assert:
    that:
      - ovn_endpoint_mtu is integer
      - ovn_endpoint_mtu > 0
    fail_msg: "ovn_endpoint_mtu must be a positive integer."

- name: Verify endpoint MTUs
  ansible.builtin.assert:
    that:
      - (ovn_endpoint.mtu | default(ovn_endpoint_mtu)) is integer
      - (ovn_endpoint.mtu | default(ovn_endpoint_mtu)) > 0
    fail_msg: "Endpoint MTUs must be positive integers."
  loop: "{{ ovn_endpoints }}"
  loop_control:
    loop_var: ovn_endpoint
    label: "{{ ovn_endpoint.name | default(ovn_endpoint.iface_id) }}"

- name: Verify endpoint DHCP client settings
  ansible.builtin.assert:
    that:
      - (ovn_endpoint.dhcp4 | default(false)) is boolean
      - >-
        not (ovn_endpoint.dhcp4 | default(false))
        or (ovn_endpoint.dhcp_timeout
            | default(ovn_endpoint_dhcp_timeout) | int) > 0
    fail_msg: "Endpoint dhcp4 must be boolean and its DHCP timeout must be positive."
  loop: "{{ ovn_endpoints }}"
  loop_control:
    loop_var: ovn_endpoint
    label: "{{ ovn_endpoint.name | default(ovn_endpoint.iface_id) }}"

- name: Configure OVN logical switch ports
  when: ovn_endpoint_mode == "ports"
  ansible.builtin.include_tasks: port.yml
  loop: "{{ ovn_endpoints }}"
  loop_control:
    loop_var: ovn_endpoint
    label: "{{ ovn_endpoint.iface_id }}"

- name: Remove absent or moved local endpoints
  when:
    - ovn_endpoint_mode == "local"
    - >-
      ovn_endpoint.state | default('present') == 'absent'
      or ovn_endpoint.host | default('') != inventory_hostname
  ansible.builtin.include_tasks: cleanup.yml
  loop: "{{ ovn_endpoints }}"
  loop_control:
    loop_var: ovn_endpoint
    label: "{{ ovn_endpoint.name }}"

- name: Configure OVN namespace endpoints
  when:
    - ovn_endpoint_mode == "local"
    - ovn_endpoint.state | default('present') == 'present'
    - ovn_endpoint.host == inventory_hostname
  ansible.builtin.include_tasks: endpoint.yml
  loop: "{{ ovn_endpoints }}"
  loop_control:
    loop_var: ovn_endpoint
    label: "{{ ovn_endpoint.name }}"
