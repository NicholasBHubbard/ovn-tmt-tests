- name: Create the logical switch
  hosts: central
  become: true
  tasks:
    - name: Create the logical switch
      ansible.builtin.command:
        cmd: ovn-nbctl --may-exist ls-add tmt-sw0
      changed_when: true

- name: Apply the top-down endpoint configuration
  ansible.builtin.import_playbook: ../../playbooks/ovn-endpoints.yml
  vars:
    ovn_endpoints:
      - name: tmt-vm1
        host: compute-1
        switch: tmt-sw0
        iface_id: tmt-vm1
        mac: "02:00:00:00:00:01"
        addresses:
          - 10.0.0.1/24
      - name: tmt-vm2
        host: compute-2
        switch: tmt-sw0
        iface_id: tmt-vm2
        mac: "02:00:00:00:00:02"
        addresses:
          - 10.0.0.2/24
