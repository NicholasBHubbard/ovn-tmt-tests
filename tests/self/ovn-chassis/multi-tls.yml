- name: Create two TLS-connected isolated OVN chassis
  hosts: all
  become: true
  roles:
    - ovn_chassis
  vars:
    ovn_chassis_remote: ssl:host.containers.internal:6642
    ovn_chassis_ssl_private_key: /run/ovn-test-pki/private-key.pem
    ovn_chassis_ssl_certificate: /run/ovn-test-pki/certificate.pem
    ovn_chassis_ssl_ca_cert: /run/ovn-test-pki/ca-cert.pem
    ovn_chassis_runtime: podman
    ovn_chassis_container_image: localhost/ovn-chassis-selftest
    ovn_chassis_container_network: ovn-chassis-selftest
    ovn_chassis_instances:
      - name: scale-a
        container_ip: 10.89.0.10
      - name: scale-b
        image: localhost/ovn-chassis-selftest-alternate
        container_ip: 10.89.0.11
