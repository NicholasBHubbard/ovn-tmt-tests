- name: Replace the synthetic chassis image
  hosts: all
  become: true
  tasks:
    - name: Create replacement image container
      ansible.builtin.command:
        argv:
          - podman
          - run
          - --name
          - ovn-chassis-image-update
          - localhost/ovn-chassis-selftest-alternate
          - touch
          - /ovn-chassis-image-updated
      changed_when: true

    - name: Commit replacement image
      ansible.builtin.command:
        argv:
          - podman
          - commit
          - --change
          - 'CMD ["sleep", "infinity"]'
          - ovn-chassis-image-update
          - localhost/ovn-chassis-selftest-alternate
      changed_when: true

    - name: Remove replacement image container
      ansible.builtin.command:
        argv:
          - podman
          - rm
          - ovn-chassis-image-update
      changed_when: true
