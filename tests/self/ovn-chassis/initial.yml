- name: Apply initial OVN gateway configuration
  ansible.builtin.import_playbook: ../../../playbooks/ovn-chassis.yml
  vars:
    install_method: distro
    ovn_bridges:
      - br-int
      - br-ex
    ovn_bridge_mappings: public:br-ex
    ovn_cms_options:
      - enable-chassis-as-gw
      - prefer-chassis-as-gw
