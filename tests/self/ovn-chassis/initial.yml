- name: Apply initial OVN gateway configuration
  ansible.builtin.import_playbook: ../../../playbooks/ovn-chassis.yml
  vars:
    ovn_install_method: distro
    ovs_setup_install_method: distro
    ovn_chassis_bridges:
      - br-int
      - br-ex
    ovn_chassis_bridge_mappings: public:br-ex
    ovn_chassis_cms_options:
      - enable-chassis-as-gw
      - prefer-chassis-as-gw
