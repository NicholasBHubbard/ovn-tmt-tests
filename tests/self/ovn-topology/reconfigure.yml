- name: Reapply changed top-down topology configuration
  ansible.builtin.import_playbook: ../../../playbooks/ovn-topology.yml
  vars:
    ovn_topology_central_hosts: all
    ovn_switches:
      - name: self-moved
        other_config:
          subnet: 198.51.100.0/24
          mcast_snoop: false
      - name: self-unused
        state: absent
    ovn_dhcp_options:
      - id: self-dhcp
        cidr: 198.51.100.0/24
        options:
          server_id: 198.51.100.1
          lease_time: 7200
          dns_server: 198.51.100.53
          ip_forward_enable: true
          classless_static_route: "{0.0.0.0/0, 198.51.100.1}"
      - id: self-dhcp-delete
        state: absent
    ovn_localnet_ports:
      - name: self-localnet
        switch: self-moved
        network: self-provider-moved
      - name: self-localnet-delete
        state: absent
    ovn_routers:
      - name: self-r1
        options:
          chassis: moved-chassis
          mac_binding_age_threshold: 10
      - name: self-r2
        state: absent
      - name: self-r3
    ovn_router_ports:
      - name: self-rp
        router: self-r3
        switch: self-moved
        switch_port: self-rp-sw
        mac: "02:00:00:00:10:03"
        networks:
          - 203.0.113.1/24
          - 2001:db8:2::ff/64
      - name: self-rp-delete
        switch_port: self-rp-delete-sw
        state: absent
    ovn_gateway_chassis:
      - id: self-gateway
        router_port: self-rp
        chassis: self-gateway-2
        priority: 30
      - id: self-gateway-secondary
        router_port: self-rp
        chassis: self-gateway-backup
        priority: 10
      - id: self-gateway-delete
        state: absent
    ovn_nat_rules:
      - id: self-nat
        router: self-r3
        type: dnat
        external_ip: 2001:db8:ffff::10
        logical_ip: 2001:db8:2::1
      - id: self-nat-delete
        state: absent
    ovn_static_routes:
      - id: self-route
        router: self-r3
        prefix: 2001:db8:ffff::/64
        nexthop: 2001:db8:2::1
      - id: self-route-delete
        state: absent
