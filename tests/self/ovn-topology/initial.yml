- name: Apply the top-down topology configuration
  ansible.builtin.import_playbook: ../../../playbooks/ovn-topology.yml
  vars:
    ovn_topology_central_hosts: all
    ovn_switches:
      - name: self-sw
        other_config:
          subnet: 192.0.2.0/24
          exclude_ips: 192.0.2.1..192.0.2.2
      - name: self-unused
      - name: self-moved
        other_config:
          subnet: 203.0.113.0/24
          exclude_ips: 203.0.113.1..203.0.113.2
          mcast_snoop: true
    ovn_dhcp_options:
      - id: self-dhcp
        cidr: 192.0.2.0/24
        options:
          server_id: 192.0.2.254
          server_mac: "02:00:00:00:10:01"
          lease_time: 3600
          router: 192.0.2.254
          dns_server: 192.0.2.53
          ip_forward_enable: false
      - id: self-dhcp-v6
        cidr: 2001:db8:1::/64
        options:
          server_id: "02:00:00:00:10:01"
          dns_server: 2001:db8::53
      - id: self-dhcp-delete
        cidr: 203.0.113.0/24
    ovn_localnet_ports:
      - name: self-localnet
        switch: self-sw
        network: self-provider
        tag: 100
      - name: self-localnet-delete
        switch: self-sw
        network: self-provider-delete
    ovn_routers:
      - name: self-r1
        options:
          chassis: self-chassis
          dynamic_neigh_routers: true
          mac_binding_age_threshold: 5
      - name: self-r2
      - name: self-r3
        options:
          chassis: clear-me
    ovn_router_ports:
      - name: self-rp
        router: self-r1
        switch: self-sw
        switch_port: self-rp-sw
        mac: "02:00:00:00:10:01"
        networks:
          - 192.0.2.254/24
          - 2001:db8:1::ff/64
      - name: self-rp-delete
        router: self-r3
        switch: self-sw
        switch_port: self-rp-delete-sw
        mac: "02:00:00:00:10:02"
      - name: self-rp-gateway
        router: self-r3
        switch: self-sw
        switch_port: self-rp-gateway-sw
        mac: "02:00:00:00:10:04"
        networks:
          - 203.0.113.254/24
    ovn_gateway_chassis:
      - id: self-gateway
        router_port: self-rp-gateway
        chassis: self-gateway-1
        priority: 20
      - id: self-gateway-secondary
        router_port: self-rp
        chassis: self-gateway-backup
      - id: self-gateway-delete
        router_port: self-rp-gateway
        chassis: self-gateway-delete
        priority: 1
    ovn_nat_rules:
      - id: self-nat
        router: self-r1
        type: dnat_and_snat
        external_ip: 198.51.100.10
        logical_ip: 192.0.2.1
        logical_port: self-port1
        external_mac: "02:00:00:00:01:01"
        external_port_range: 10000-20000
        gateway_port: self-rp
        match: ip4.src == 192.0.2.0/24
        priority: 100
        options:
          stateless: true
          add_route: true
      - id: self-nat-snat
        router: self-r1
        type: snat
        external_ip: 198.51.100.20
        logical_ip: 192.0.2.0/24
      - id: self-nat-delete
        router: self-r3
        type: dnat
        external_ip: 203.0.113.10
        logical_ip: 192.0.2.10
    ovn_static_routes:
      - id: self-route
        router: self-r1
        prefix: 198.51.100.0/24
        nexthop: 192.0.2.1
        policy: src-ip
        route_table: blue
        output_port: self-rp
      - id: self-route-delete
        router: self-r3
        prefix: 203.0.113.0/24
        nexthop: 192.0.2.2

- name: Create unmanaged logical topology
  hosts: all
  become: true
  tasks:
    - name: Add unmanaged route for preservation test
      ansible.builtin.command:
        cmd: >-
          ovn-nbctl --may-exist lr-route-add
          self-r3 192.0.2.0/24 203.0.113.2
      changed_when: true

    - name: Add unmanaged localnet port for preservation test
      ansible.builtin.command:
        cmd: >-
          ovn-nbctl lsp-add-localnet-port
          self-sw self-localnet-unmanaged unmanaged-provider
      changed_when: true

    - name: Add unmanaged gateway chassis for preservation test
      ansible.builtin.command:
        cmd: >-
          ovn-nbctl lrp-set-gateway-chassis
          self-rp-gateway self-gateway-unmanaged 5
      changed_when: true

    - name: Add unmanaged NAT rule for preservation test
      ansible.builtin.command:
        cmd: >-
          ovn-nbctl --may-exist lr-nat-add
          self-r3 snat 203.0.113.20 10.0.0.0/24
      changed_when: true

    - name: Add unmanaged DHCP options for preservation test
      ansible.builtin.command:
        cmd: ovn-nbctl dhcp-options-create 10.10.0.0/24
      changed_when: true
