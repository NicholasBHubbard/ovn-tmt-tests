- name: Create endpoint topology fixtures
  ansible.builtin.import_playbook: ../../../playbooks/ovn-topology.yml
  vars:
    ovn_topology_central_hosts: all
    ovn_switches:
      - name: self-sw
        other_config:
          subnet: 192.0.2.0/24
          exclude_ips: 192.0.2.1..192.0.2.2
      - name: self-moved
    ovn_dhcp_options:
      - id: self-dhcp
        cidr: 192.0.2.0/24
        options:
          server_id: 192.0.2.254
          server_mac: "02:00:00:00:10:01"
          lease_time: 3600
          router: 192.0.2.254
          dns_server: 192.0.2.53
      - id: self-dhcp-v6
        cidr: 2001:db8:1::/64
        options:
          server_id: "02:00:00:00:10:01"
          dns_server: 2001:db8::53

- name: Apply the initial endpoint configuration
  ansible.builtin.import_playbook: ../../../playbooks/ovn-endpoints.yml
  vars:
    ovn_endpoint_central_hosts: all
    ovn_endpoint_compute_hosts: all
    ovn_endpoint_dhcp_timeout: 10
    ovn_endpoint_mtu: 1400
    ovn_endpoints:
      - name: self-vm1
        host: default-0
        switch: self-sw
        iface_id: self-port1
        mac: "02:00:00:00:01:01"
        addresses:
          - 192.0.2.1/24
          - 192.0.2.11/24
          - 2001:db8:1::1/64
        options:
          requested-chassis: default-0
          mcast_flood: false
        routes:
          - to: default
            via: 192.0.2.254
          - to: 198.51.100.0/24
            via: 192.0.2.253
            metric: 100
            table: 100
          - to: default
            via: 2001:db8:1::ff
            metric: 50
          - to: default
            family: 6
            table: 200
      - name: self-vm2
        host: default-0
        switch: self-sw
        iface_id: self-port2
        mac: "02:00:00:00:02:01"
        mtu: 1450
        address_mode: dynamic
        dhcpv4_options: self-dhcp
        dhcp4: true
        addresses: []
      - name: self-remote
        host: another-host
        switch: self-sw
        iface_id: self-port3
        mac: "02:00:00:00:03:01"
        address_mode: dynamic
        dhcpv4_options: self-dhcp
        dhcpv6_options: self-dhcp-v6
        addresses: []
      - name: self-delete
        host: default-0
        switch: self-sw
        iface_id: self-port4
        mac: "02:00:00:00:04:01"
        addresses:
          - 192.0.2.2/24

- name: Record initial DHCP client
  hosts: all
  become: true
  tasks:
    - name: Record self-vm2 DHCP client PID
      ansible.builtin.copy:
        src: /run/ovn-tmt-tests/self-vm2-dhclient4.pid
        remote_src: true
        dest: /tmp/self-vm2-initial-dhclient4-pid
        mode: "0600"

- name: Reapply the DHCP endpoint configuration
  ansible.builtin.import_playbook: ../../../playbooks/ovn-endpoints.yml
  vars:
    ovn_endpoint_central_hosts: all
    ovn_endpoint_compute_hosts: all
    ovn_endpoint_dhcp_timeout: 10
    ovn_endpoint_mtu: 1400
    ovn_endpoints:
      - name: self-vm2
        host: default-0
        switch: self-sw
        iface_id: self-port2
        mac: "02:00:00:00:02:01"
        mtu: 1450
        address_mode: dynamic
        dhcpv4_options: self-dhcp
        dhcp4: true
        addresses: []
