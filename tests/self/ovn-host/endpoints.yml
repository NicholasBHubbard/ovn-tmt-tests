- name: Apply the top-down topology configuration
  ansible.builtin.import_playbook: ../../../playbooks/ovn-topology.yml
  vars:
    ovn_topology_central_hosts: all
    ovn_switches:
      - name: self-sw
      - name: self-unused
    ovn_routers:
      - name: self-r1
        options:
          chassis: self-chassis
          dynamic_neigh_routers: true
          mac_binding_age_threshold: 5
      - name: self-r2
      - name: self-r3
        options:
          chassis: clear-me

- name: Apply the top-down endpoint configuration
  ansible.builtin.import_playbook: ../../../playbooks/ovn-endpoints.yml
  vars:
    ovn_endpoint_central_hosts: all
    ovn_endpoint_compute_hosts: all
    ovn_endpoints:
      - name: self-vm1
        host: default-0
        switch: self-sw
        iface_id: self-port1
        mac: "02:00:00:00:01:01"
        addresses:
          - 192.0.2.1/24
          - 192.0.2.11/24
          - 2001:db8:1::1/64
        routes:
          - to: default
            via: 192.0.2.254
          - to: 198.51.100.0/24
            via: 192.0.2.253
            metric: 100
            table: 100
          - to: default
            via: 2001:db8:1::ff
            metric: 50
          - to: default
            family: 6
            table: 200
      - name: self-vm2
        host: default-0
        switch: self-sw
        iface_id: self-port2
        mac: "02:00:00:00:02:01"
        addresses:
          - 192.0.2.2/24
      - name: self-remote
        host: another-host
        switch: self-sw
        iface_id: self-port3
        mac: "02:00:00:00:03:01"
        addresses:
          - 192.0.2.3/24
      - name: self-delete
        host: default-0
        switch: self-sw
        iface_id: self-port4
        mac: "02:00:00:00:04:01"
        addresses:
          - 192.0.2.4/24
