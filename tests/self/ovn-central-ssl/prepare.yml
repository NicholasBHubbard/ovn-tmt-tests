- name: Prepare OVN TLS credentials
  hosts: all
  become: true
  tasks:
    - name: Create Open vSwitch configuration directory
      ansible.builtin.file:
        path: /etc/openvswitch
        state: directory
        mode: "0755"

    - name: Create CA private key
      ansible.builtin.command:
        argv:
          - openssl
          - genrsa
          - -out
          - /etc/openvswitch/ca-privkey.pem
          - "2048"
      args:
        creates: /etc/openvswitch/ca-privkey.pem

    - name: Create CA certificate
      ansible.builtin.command:
        argv:
          - openssl
          - req
          - -x509
          - -new
          - -key
          - /etc/openvswitch/ca-privkey.pem
          - -out
          - /etc/openvswitch/cacert.pem
          - -days
          - "1"
          - -subj
          - /CN=Test CA
      args:
        creates: /etc/openvswitch/cacert.pem

    - name: Create OVN private key
      ansible.builtin.command:
        argv:
          - openssl
          - genrsa
          - -out
          - /etc/openvswitch/ovn-privkey.pem
          - "2048"
      args:
        creates: /etc/openvswitch/ovn-privkey.pem

    - name: Create OVN certificate request
      ansible.builtin.command:
        argv:
          - openssl
          - req
          - -new
          - -key
          - /etc/openvswitch/ovn-privkey.pem
          - -out
          - /etc/openvswitch/ovn-req.pem
          - -subj
          - /CN=OVN
      args:
        creates: /etc/openvswitch/ovn-req.pem

    - name: Sign OVN certificate
      ansible.builtin.command:
        argv:
          - openssl
          - x509
          - -req
          - -in
          - /etc/openvswitch/ovn-req.pem
          - -CA
          - /etc/openvswitch/cacert.pem
          - -CAkey
          - /etc/openvswitch/ca-privkey.pem
          - -CAcreateserial
          - -out
          - /etc/openvswitch/ovn-cert.pem
          - -days
          - "1"
      args:
        creates: /etc/openvswitch/ovn-cert.pem

    - name: Remove temporary credential files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/openvswitch/ovn-req.pem
        - /etc/openvswitch/ca-privkey.pem
        - /etc/openvswitch/cacert.srl
