name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run-container-tests:
        description: Run container-backed CI smoke tests
        required: false
        default: false
        type: boolean
      container-plan:
        description: tmt plan regex for manual container-backed runs
        required: false
        default: /plans/self/ci/container
        type: string

permissions:
  contents: read

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      container_self_tests: ${{ steps.changed.outputs.container_self_tests }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Classify changed files
        id: changed
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            : > changed-files.txt
            all=true
          else
            all=false
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              base="${{ github.event.pull_request.base.sha }}"
            else
              base="${{ github.event.before }}"
            fi

            if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
              base=$(git rev-list --max-parents=0 HEAD)
            fi

            git diff --name-only "$base" "$GITHUB_SHA" > changed-files.txt
          fi

          if [ "$all" = true ] || grep -E -q \
            '^(plans/self/ci/|tests/self/ci/|tests/lib/|\.github/workflows/ci\.yml)' \
            changed-files.txt; then
            echo "container_self_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "container_self_tests=false" >> "$GITHUB_OUTPUT"
          fi

          echo 'Changed files:'
          cat changed-files.txt

  shell:
    name: Shell syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shell syntax checks
        run: find tests \( -name '*.sh' -o -name '*.bash' \) -print0 | xargs -0 -n1 bash -n

      - name: Run ShellCheck
        run: find tests \( -name '*.sh' -o -name '*.bash' \) -print0 | xargs -0 shellcheck --shell=bash -x -e SC1091

  yaml:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install yamllint
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Run yamllint
        run: yamllint .

  tmt-lint:
    name: tmt lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install tmt
        run: pipx install tmt

      - name: Run tmt lint
        run: tmt lint plans tests

  ansible:
    name: Ansible checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Ansible tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible-core ansible-lint

      - name: Run Ansible syntax checks
        run: |
          for playbook in playbooks/*.yml; do
            ansible-playbook --syntax-check -i localhost, -c local "$playbook"
          done

      - name: Run ansible-lint
        run: ansible-lint --profile production playbooks roles

  static-self-tests:
    name: Static self-tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install tmt
        run: pipx install tmt

      - name: Run direct static self-tests
        run: |
          ./tests/self/contracts/post.sh
          ./tests/self/ansible-packaging/post.sh
          ./tests/self/ci/post.sh

      - name: Run static tmt self-test plans
        run: tmt run --all plan --name '/plans/self/(contracts|ansible-packaging|ci)/base' provision --feeling-safe

  container-self-tests:
    name: Container self-tests
    needs: changes
    if: >-
      needs.changes.outputs.container_self_tests == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs['run-container-tests'])
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install container test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y podman
          pipx install 'tmt[provision-container]'

      - name: Run container-backed tmt self-tests
        env:
          TMT_PLAN: >-
            ${{ github.event_name == 'workflow_dispatch'
            && inputs['container-plan']
            || '/plans/self/ci/container' }}
        run: tmt run --all plan --name "$TMT_PLAN"
