name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run-self-tests:
        description: Run self-tests
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  self-test-changes:
    name: Detect self-test changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.self_test_changes.outputs.changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for self-test changes
        id: self_test_changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            base=$(git rev-list --max-parents=0 HEAD)
          fi

          pattern='^(plans/self/|tests/self/|tests/lib/|roles/|playbooks/|ansible\.cfg|\.github/workflows/ci\.yml)'
          if git diff --name-only "$base" HEAD | grep -qE "$pattern"; then
            echo "changed=true"
          else
            echo "changed=false"
          fi >> "$GITHUB_OUTPUT"

  shell:
    name: Shell syntax
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: find tests \( -name '*.sh' -o -name '*.bash' \) -exec shellcheck --shell=bash -x -e SC1091 {} +

  yaml:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install yamllint
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Run yamllint
        run: yamllint .

  tmt-lint:
    name: tmt lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install tmt
        run: pipx install tmt

      - name: Run tmt lint
        run: tmt lint plans tests

  ansible:
    name: Ansible checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Ansible tooling
        run: pipx install ansible-lint

      - name: Run ansible-lint
        run: ansible-lint --profile production playbooks roles

  self-tests:
    name: Self tests
    needs: self-test-changes
    if: >-
      needs.self-test-changes.outputs.changed == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs['run-self-tests'])
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install self-test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible-core podman
          pipx install 'tmt[all]'

      - name: Run tmt self-test plans
        run: tmt run --all plan --name '/plans/self/' provision --feeling-safe
