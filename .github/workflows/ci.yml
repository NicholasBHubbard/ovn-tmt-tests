name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run-self-tests:
        description: Run self-tests
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Python tooling
        run: pip install ansible-core pytest pyyaml ruff==0.15.22

      - name: Run Python checks
        run: |
          ruff check --show-fixes tests/lib/ovn_test tests/ovn-scale tests/self
          ruff format --check tests/lib/ovn_test tests/ovn-scale tests/self
          PYTHONPATH=tests/lib pytest -q tests/self/contracts

  actionlint:
    name: GitHub Actions lint
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Run actionlint
        run: '"$(go env GOPATH)/bin/actionlint"'

  self-test-changes:
    name: Detect self-test changes
    runs-on: ubuntu-26.04
    outputs:
      changed: ${{ steps.self_test_changes.outputs.changed }}
      plans: ${{ steps.discover.outputs.plans }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install tmt
        run: pipx install tmt

      - name: Check for self-test changes
        id: self_test_changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]] || ! git cat-file -e "$base" 2>/dev/null; then
            base=$(git rev-list --max-parents=0 HEAD)
          fi

          changed=$(git diff --name-only "$base" HEAD | .github/scripts/self-test-changes.sh)
          echo "changed=$changed" >> "$GITHUB_OUTPUT"

      - name: Discover self-test plans
        id: discover
        run: |
          plans=$(tmt plan ls --filter 'enabled:true' | grep '/plans/self/' \
            | grep -v 'brew-packages' \
            | sed 's|^/plans/self/||' | jq -Rc . | jq -sc .)
          echo "plans=$plans" >> "$GITHUB_OUTPUT"

  shell:
    name: Shell syntax
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: >-
          find tests .github/scripts \( -name '*.sh' -o -name '*.bash' \)
          -exec shellcheck --severity=warning --shell=bash -x -e SC1091 {} +

  yaml:
    name: YAML lint
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install yamllint
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Run yamllint
        run: >-
          git ls-files -z -- '*.yaml' '*.yml' '*.fmf'
          | xargs -0 yamllint --strict

  tmt-lint:
    name: tmt lint
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install tmt
        run: pipx install tmt

      - name: Run tmt lint
        run: tmt lint plans tests

  ansible:
    name: Ansible checks
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # Use pip for ansible-lint to match whichever ansible the runner
      # ships. Mixing pip and apt ansible packages causes version mismatches.
      - name: Install Ansible tooling
        run: |
          pip install ansible-lint
          ansible-galaxy collection install ansible.posix community.general

      - name: Run ansible-lint
        run: ansible-lint --strict playbooks roles

  self-tests:
    name: Self tests
    needs: self-test-changes
    if: >-
      needs.self-test-changes.outputs.changed == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs['run-self-tests'])
    uses: ./.github/workflows/self-tests.yml
    with:
      plans: ${{ needs.self-test-changes.outputs.plans }}

  macos:
    name: macOS brew packages
    needs: self-test-changes
    if: >-
      needs.self-test-changes.outputs.changed == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs['run-self-tests'])
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Ansible
        run: |
          pipx install ansible-core
          ansible-galaxy collection install ansible.posix community.general
          python3 -m pip install --user --break-system-packages pytest pyyaml

      - name: Run pre-check
        run: >-
          python3 -m pytest -q -s
          ./tests/self/brew-packages/test.py::TestPreconditions
        env:
          TMT_TREE: ${{ github.workspace }}

      - name: Install packages via Ansible
        run: ansible-playbook -c local -i localhost, tests/self/brew-packages/install.yml

      - name: Run post-check
        run: >-
          python3 -m pytest -q -s
          ./tests/self/brew-packages/test.py::TestResult
        env:
          TMT_TREE: ${{ github.workspace }}
