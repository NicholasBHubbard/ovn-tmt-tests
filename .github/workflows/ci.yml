name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run-self-tests:
        description: Run self-tests
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  self-test-changes:
    name: Detect self-test changes
    runs-on: ubuntu-26.04
    outputs:
      changed: ${{ steps.self_test_changes.outputs.changed }}
      plans: ${{ steps.discover.outputs.plans }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install tmt
        run: pipx install tmt

      - name: Check for self-test changes
        id: self_test_changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          if [ -z "$base" ] || [[ "$base" =~ ^0+$ ]]; then
            base=$(git rev-list --max-parents=0 HEAD)
          fi

          pattern='^(plans/self/|tests/self/|tests/lib/|roles/|playbooks/|ansible\.cfg|\.github/workflows/)'
          if git diff --name-only "$base" HEAD | grep -qE "$pattern"; then
            echo "changed=true"
          else
            echo "changed=false"
          fi >> "$GITHUB_OUTPUT"

      - name: Discover self-test plans
        id: discover
        run: |
          plans=$(tmt plan ls --filter 'enabled:true' | grep '/plans/self/' \
            | sed 's|^/plans/self/||' | jq -Rc . | jq -sc .)
          echo "plans=$plans" >> "$GITHUB_OUTPUT"

  shell:
    name: Shell syntax
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install shell tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: >-
          find tests \( -name '*.sh' -o -name '*.bash' \)
          -exec shellcheck --severity=warning --shell=bash -x -e SC1091 {} +

  yaml:
    name: YAML lint
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install yamllint
        run: |
          sudo apt-get update
          sudo apt-get install -y yamllint

      - name: Run yamllint
        run: yamllint --strict .

  tmt-lint:
    name: tmt lint
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install tmt
        run: pipx install tmt

      - name: Run tmt lint
        run: tmt lint plans tests

  ansible:
    name: Ansible checks
    runs-on: ubuntu-26.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # The runner pre-installs ansible via pip. Remove it so apt
      # provides a consistent ansible-core + ansible-lint pair.
      - name: Install Ansible tooling
        run: |
          pip uninstall -y ansible-core
          sudo apt-get update
          sudo apt-get install -y ansible-lint
          ansible-galaxy collection install ansible.posix

      - name: Run ansible-lint
        run: ansible-lint --strict playbooks roles

  self-tests:
    name: Self tests
    needs: self-test-changes
    if: >-
      needs.self-test-changes.outputs.changed == 'true' ||
      (github.event_name == 'workflow_dispatch' && inputs['run-self-tests'])
    uses: ./.github/workflows/self-tests.yml
    with:
      plans: ${{ needs.self-test-changes.outputs.plans }}
