name: Self tests

on:
  workflow_call:
    inputs:
      plans:
        required: true
        type: string

permissions:
  contents: read

jobs:
  run:
    name: ${{ matrix.plan }}
    runs-on: ubuntu-26.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        plan: ${{ fromJson(inputs.plans) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      # The runner pre-installs ansible via pip. Remove it so apt
      # provides a consistent ansible-core version.
      - name: Install self-test dependencies
        run: |
          pip uninstall -y ansible-core
          sudo apt-get update
          sudo apt-get install -y ansible-core podman qemu-system-x86 \
            libvirt-daemon-system libvirt-dev pkg-config genisoimage
          ansible-galaxy collection install ansible.posix
          pipx install 'tmt[provision-container,provision-virtual]'

      - name: Run tmt self-test plan
        run: >-
          sudo env PATH="$PATH"
          tmt run --all plan --name '/plans/self/${{ matrix.plan }}' provision --feeling-safe
