- name: Configure OVN topology
  hosts: "{{ ovn_topology_central_hosts | default('central') }}"
  become: true
  roles:
    - ovn_switches
    - ovn_dhcp_options
    - ovn_localnet_ports
    - ovn_routers
    - ovn_router_ports
    - ovn_gateway_chassis
    - ovn_nat
    - ovn_static_routes
    - ovn_load_balancers
