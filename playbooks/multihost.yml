- name: Set up OVN central
  hosts: central
  become: true
  roles:
    - ovn_install
    - ovs_setup
    - ovn_central

- name: Resolve central for OVN hosts
  hosts: compute:gateway
  gather_facts: false
  tasks:
    - name: Resolve central address
      ansible.builtin.set_fact:
        ovn_central_address: >-
          {{ hostvars[groups['central'][0]]['ansible_host']
             | default(groups['central'][0]) }}
      tags: topology-resolution

    - name: Wait for SB database to be reachable on central
      ansible.builtin.wait_for:
        host: "{{ ovn_central_address }}"
        port: "{{ ovn_sb_port | default(6642) }}"
        timeout: 2700

- name: Set up OVN host on compute nodes
  hosts: compute
  become: true
  roles:
    - ovn_install
    - ovs_setup
    - ovn_host
  vars:
    ovn_remote: "tcp:{{ ovn_central_address }}:{{ ovn_sb_port }}"

- name: Set up OVN host on gateway nodes
  hosts: gateway
  become: true
  roles:
    - ovn_install
    - ovs_setup
    - ovn_host
  vars:
    ovn_remote: "tcp:{{ ovn_central_address }}:{{ ovn_sb_port }}"
    ovn_chassis_name: >-
      {{ ovn_gateway_chassis_name | default(inventory_hostname) }}
    ovn_bridges: >-
      {{ ovn_gateway_bridges | default(['br-int', 'br-ex']) }}
    ovn_bridge_mappings: >-
      {{ ovn_gateway_bridge_mappings | default('public:br-ex') }}
    ovn_cms_options: >-
      {{ ovn_gateway_cms_options | default(['enable-chassis-as-gw']) }}
