- name: Set up OVN central
  hosts: central
  become: true
  roles:
    - ovn_install
    - ovs_setup
    - role: ovn_central
      ovn_ssl_private_key: >-
        {{ ovn_multihost_ssl_private_key
           | default('/run/ovn-test-pki/private-key.pem') }}
      ovn_ssl_certificate: >-
        {{ ovn_multihost_ssl_certificate
           | default('/run/ovn-test-pki/certificate.pem') }}
      ovn_ssl_ca_cert: >-
        {{ ovn_multihost_ssl_ca_cert
           | default('/run/ovn-test-pki/ca-cert.pem') }}

- name: Resolve central for OVN hosts
  hosts: compute:gateway
  gather_facts: false
  tasks:
    - name: Resolve central address
      ansible.builtin.set_fact:
        ovn_central_address: >-
          {{ hostvars[groups['central'][0]]['ansible_host']
             | default(groups['central'][0]) }}
      tags: topology-resolution

    - name: Wait for SB database to be reachable on central
      ansible.builtin.wait_for:
        host: "{{ ovn_central_address }}"
        port: "{{ ovn_sb_port | default(6642) }}"
        timeout: 2700

- name: Set up OVN host on compute nodes
  hosts: compute
  become: true
  roles:
    - ovn_install
    - role: ovs_setup
      ovs_ssl_enabled: "{{ ovn_ssl_enabled | default(false) | bool }}"
      ovs_ssl_private_key: >-
        {{ ovn_multihost_ssl_private_key
           | default('/run/ovn-test-pki/private-key.pem') }}
      ovs_ssl_certificate: >-
        {{ ovn_multihost_ssl_certificate
           | default('/run/ovn-test-pki/certificate.pem') }}
      ovs_ssl_ca_cert: >-
        {{ ovn_multihost_ssl_ca_cert
           | default('/run/ovn-test-pki/ca-cert.pem') }}
    - ovn_host
  vars:
    ovn_remote: >-
      {{ 'ssl' if ovn_ssl_enabled | default(false) | bool else 'tcp' }}:{{ ovn_central_address }}:{{ ovn_sb_port }}

- name: Set up OVN host on gateway nodes
  hosts: gateway
  become: true
  roles:
    - ovn_install
    - role: ovs_setup
      ovs_ssl_enabled: "{{ ovn_ssl_enabled | default(false) | bool }}"
      ovs_ssl_private_key: >-
        {{ ovn_multihost_ssl_private_key
           | default('/run/ovn-test-pki/private-key.pem') }}
      ovs_ssl_certificate: >-
        {{ ovn_multihost_ssl_certificate
           | default('/run/ovn-test-pki/certificate.pem') }}
      ovs_ssl_ca_cert: >-
        {{ ovn_multihost_ssl_ca_cert
           | default('/run/ovn-test-pki/ca-cert.pem') }}
    - ovn_host
  vars:
    ovn_remote: >-
      {{ 'ssl' if ovn_ssl_enabled | default(false) | bool else 'tcp' }}:{{ ovn_central_address }}:{{ ovn_sb_port }}
    ovn_chassis_name: >-
      {{ ovn_gateway_chassis_name | default(inventory_hostname) }}
    ovn_bridges: >-
      {{ ovn_gateway_bridges | default(['br-int', 'br-ex']) }}
    ovn_bridge_mappings: >-
      {{ ovn_gateway_bridge_mappings | default('public:br-ex') }}
    ovn_cms_options: >-
      {{ ovn_gateway_cms_options | default(['enable-chassis-as-gw']) }}
